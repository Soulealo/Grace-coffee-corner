<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grace Coffee Shop — Захиалга шалгах</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --cream:#F5EFE0; --espresso:#2C1A0E; --caramel:#C08B45; --latte:#D4B483; --foam:#FAF6EE; --dark-roast:#1A0F07; --line:rgba(192,139,69,0.25); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100vh; background:var(--espresso); color:var(--cream); font-family:'DM Sans',sans-serif; font-weight:300; display:grid; place-items:center; padding:24px; }
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 80% 60% at 20% 10%, rgba(192,139,69,.12), transparent 60%), radial-gradient(ellipse 60% 80% at 80% 90%, rgba(192,139,69,.08), transparent 60%); pointer-events:none; }
  .panel { position:relative; width:min(620px,100%); border:1px solid var(--line); border-radius:18px; background:rgba(255,255,255,.04); padding:38px; }
  .logo { display:block; color:var(--caramel); text-decoration:none; font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; margin-bottom:16px; }
  h1 { font-family:'Playfair Display',serif; font-size:clamp(2rem,6vw,3.2rem); font-weight:400; margin-bottom:12px; }
  p { color:var(--latte); line-height:1.7; margin-bottom:24px; }
  form { display:grid; gap:14px; }
  label { font-size:11px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; color:var(--latte); }
  input { width:100%; margin-top:8px; background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:8px; padding:14px 16px; color:var(--cream); font:inherit; outline:none; text-transform:uppercase; }
  input:focus { border-color:var(--caramel); box-shadow:0 0 0 3px rgba(192,139,69,.1); }
  button, .link { border:1px solid rgba(192,139,69,.4); border-radius:50px; padding:13px 24px; font:inherit; font-size:12px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; text-decoration:none; text-align:center; }
  button { background:var(--caramel); color:var(--dark-roast); border-color:var(--caramel); }
  button:disabled { opacity:.65; cursor:not-allowed; }
  .links { display:flex; gap:10px; flex-wrap:wrap; margin-top:22px; }
  .link { color:var(--caramel); background:transparent; }
  .result { display:none; margin-top:22px; padding:18px; border:1px solid var(--line); border-radius:12px; background:rgba(192,139,69,.08); line-height:1.8; }
  .result.show { display:block; }
  .error { color:#ffb2a8; border-color:rgba(224,112,112,.35); background:rgba(224,112,112,.09); }
</style>
</head>
<body>
  <main class="panel">
    <a class="logo" href="/">Grace Coffee Shop</a>
    <h1>Захиалга шалгах</h1>
    <p>Захиалга илгээх үед авсан дугаараа оруулаад төлөвөө шалгана уу.</p>
    <form id="checkForm">
      <label>Захиалгын дугаар
        <input id="bookingRef" required placeholder="GC-EVENT-2026-12345">
      </label>
      <button id="checkBtn" type="submit">Шалгах</button>
    </form>
    <div id="result" class="result"></div>
    <div class="links">
      <a class="link" href="/">Захиалга өгөх</a>
      <a class="link" href="/login.html">Удирдлага</a>
    </div>
  </main>

<script>
  const form = document.getElementById('checkForm');
  const btn = document.getElementById('checkBtn');
  const result = document.getElementById('result');
  const labels = { pending:'Хүлээгдэж буй', confirmed:'Батлагдсан', completed:'Дууссан', cancelled:'Цуцлагдсан' };

  form.addEventListener('submit', (event) => {
    event.preventDefault();
    const ref = document.getElementById('bookingRef').value.trim().toUpperCase();
    if (!ref) return;

    result.className = 'result';
    btn.disabled = true;
    btn.textContent = 'Шалгаж байна...';

    fetch(`/api/bookings/${encodeURIComponent(ref)}/status`)
      .then(async res => {
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Захиалга олдсонгүй');
        return data;
      })
      .then(({ booking }) => {
        const date = new Date(booking.eventDate).toLocaleDateString('mn-MN');
        result.className = 'result show';
        result.innerHTML = `<strong>${booking.bookingRef}</strong><br>Төлөв: <strong>${labels[booking.status] || booking.status}</strong><br>Огноо: ${date} ${booking.eventTime}${booking.managerNote ? `<br>Тэмдэглэл: ${booking.managerNote}` : ''}`;
      })
      .catch(err => {
        result.className = 'result show error';
        result.textContent = err.message || 'Сүлжээний алдаа гарлаа';
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = 'Шалгах';
      });
  });
</script>
</body>
</html>
