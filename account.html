<script>
  const token = localStorage.getItem('cb_token');
  if (!token) window.location.href = '/login.html';
  const headers = { 'Content-Type':'application/json', Authorization:`Bearer ${token}` };
  const alertBox = document.getElementById('alert');

  function api(url, options = {}) {
    return fetch(url, { ...options, headers:{ ...headers, ...(options.headers || {}) } })
      .then(async res => {
        const data = await res.json().catch(() => ({}));
        if (res.status === 401) {
          localStorage.clear();
          window.location.href = '/login.html';
        }
        if (!res.ok) throw new Error(data.error || 'ÐÐ»Ð´Ð°Ð° Ð³Ð°Ñ€Ð»Ð°Ð°');
        return data;
      });
  }

  function render(user) {
    localStorage.setItem('cb_user', JSON.stringify(user));
    document.getElementById('hello').textContent = `${user.name} Â· ${user.email}`;
    document.getElementById('points').textContent = user.loyaltyPoints || 0;
    document.querySelector('[name="name"]').value = user.name || '';
    document.querySelector('[name="email"]').value = user.email || '';
    document.querySelector('[name="phone"]').value = user.phone || '';
  }

  api('/api/loyalty/me').then(data => render(data.user)).catch(err => {
    alertBox.textContent = err.message;
    alertBox.className = 'alert show';
  });

  document.getElementById('profileForm').addEventListener('submit', event => {
    event.preventDefault();

    api('/api/auth/me', { method:'PATCH', body:JSON.stringify(values) })
      .then(data => {

        alertBox.className = 'alert show';
      });
  });

  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.clear();
    window.location.href = '/landing.html';
  });
</script>
